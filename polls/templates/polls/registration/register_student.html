{% extends 'polls/base.html' %}

{% block title %}Регистрация студента{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4>Регистрация студента</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100 mt-3">Зарегистрироваться как студент</button>
                </form>
            </div>
            <div class="card-footer text-center">
                Уже есть аккаунт? <a href="{% url 'login_student' %}">Войти как студент</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
