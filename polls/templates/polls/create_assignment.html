{% extends 'polls/base.html' %}

{% block title %}Создать задание{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4>Создать новое задание</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100 mt-3">Создать задание</button>
                </form>
            </div>
            <div class="card-footer text-center">
                <a href="{% url 'teacher_dashboard' %}" class="btn btn-secondary">Вернуться в панель</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
